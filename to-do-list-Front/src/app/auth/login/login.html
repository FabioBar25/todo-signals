<section class="auth-page">
  <div class="auth-panel">
    <div class="auth-card">
      <div>
        <p class="auth-eyebrow">Welcome Back</p>
        <h2 class="auth-heading">Log in to your notebook</h2>
        <p class="auth-subtitle">
          Use your account details to continue organizing tasks, ideas, and reminders.
        </p>
      </div>

      <form class="auth-form" (ngSubmit)="submit()">
        <label class="auth-field">
          <span>Email</span>
          <input
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
          />
        </label>

        <label class="auth-field">
          <span>Password</span>
          <input
            type="password"
            autocomplete="current-password"
            placeholder="Enter your password"
            [value]="password()"
            (input)="password.set($any($event.target).value)"
          />
        </label>

        @if (error(); as errorMessage) {
          <p class="auth-feedback error">{{ errorMessage }}</p>
        }

        <button class="auth-submit" type="submit" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <div class="auth-footer">
        <p>
          Need an account?
          <a class="auth-link" routerLink="/register">Create one</a>
        </p>
      </div>
    </div>
  </div>
</section>
