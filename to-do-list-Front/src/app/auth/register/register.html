<section class="auth-page">
  <div class="auth-panel">
    <div class="auth-card">
      <div>
        <p class="auth-eyebrow">New Account</p>
        <h2 class="auth-heading">Create your workspace</h2>
        <p class="auth-subtitle">
          Set up your account to start capturing tasks, priorities, and quick notes in one place.
        </p>
      </div>

      <form class="auth-form" (ngSubmit)="submit()">
        <label class="auth-field">
          <span>Full name</span>
          <input
            type="text"
            autocomplete="name"
            placeholder="Fabio Bareiro"
            [value]="fullName()"
            (input)="fullName.set($any($event.target).value)"
          />
        </label>

        <label class="auth-field">
          <span>Email</span>
          <input
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            [value]="email()"
            (input)="email.set($any($event.target).value)"
          />
        </label>

        <div class="auth-grid-2">
          <label class="auth-field">
            <span>Password</span>
            <input
              type="password"
              autocomplete="new-password"
              placeholder="At least 8 characters"
              [value]="password()"
              (input)="password.set($any($event.target).value)"
            />
          </label>

          <label class="auth-field">
            <span>Confirm password</span>
            <input
              type="password"
              autocomplete="new-password"
              placeholder="Repeat your password"
              [value]="confirmPassword()"
              (input)="confirmPassword.set($any($event.target).value)"
            />
          </label>
        </div>

        @if (error(); as errorMessage) {
          <p class="auth-feedback error">{{ errorMessage }}</p>
        }

        @if (success(); as successMessage) {
          <p class="auth-feedback success">{{ successMessage }}</p>
        }

        <button class="auth-submit" type="submit" [disabled]="isSubmitting()">
          {{ isSubmitting() ? 'Creating account...' : 'Create Account' }}
        </button>
      </form>

      <div class="auth-footer">
        <p>
          Already registered?
          <a class="auth-link" routerLink="/login">Sign in</a>
        </p>
      </div>
    </div>
  </div>
</section>
