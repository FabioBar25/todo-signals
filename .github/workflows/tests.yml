name: Tests

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: to-do-list-API

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore TodoList.Backend.sln

      - name: Test
        run: dotnet test TodoList.Backend.sln --no-restore --verbosity normal

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: to-do-list-Front

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: to-do-list-Front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test
