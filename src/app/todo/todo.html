<div class="app-container">
  <div class="todo-card">
    <h1 class="title">My Tasks</h1>

    <div class="input-row">
      <input
        type="text"
        placeholder="Add a task..."
        [value]="newTask()"
        (input)="newTask.set($any($event.target).value)"
      />
      <button (click)="addTask()" [disabled]="store.isSaving()">Add</button>
    </div>

    @if (store.isLoading()) {
      <p class="status-message">Loading tasks...</p>
    }

    @if (store.error(); as error) {
      <p class="status-message error">{{ error }}</p>
    }

    <ul>
      @for (task of store.tasks(); track task.id) {
        <li>
          @if (editingTaskId() !== task.id) {
            <div class="edit-row">
              <span class="task-title">{{ task.title }}</span>
              <div class="button-positive">
                <button (click)="startEdit(task)" [disabled]="store.isSaving()">Edit</button>
              </div>
              <div class="button-negative">
                <button (click)="deleteTask(task.id)" [disabled]="store.isSaving()">Delete</button>
              </div>
            </div>
          } @else {
            <div class="edit-row">
              <div class="input-edit">
                <input
                  [value]="editedTitle()"
                  (input)="editedTitle.set($any($event.target).value)"
                />
              </div>
              <div class="button-positive">
                <button (click)="saveEdit(task.id)" [disabled]="store.isSaving()">Save</button>
              </div>
              <div class="button-negative">
                <button (click)="cancelEdit()" [disabled]="store.isSaving()">Cancel</button>
              </div>
            </div>
          }
        </li>
      }
    </ul>
  </div>
</div>
